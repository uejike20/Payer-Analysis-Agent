services:
  authpipeline:
    container_name: authpipeline-agent
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app/AnalysisPipeline
    environment:
      - AUTHPIPELINE_MODE=continuous
    restart: unless-stopped
    volumes:
      - ./AnalysisPipeline/payer_sources:/app/AnalysisPipeline/payer_sources
      - ./AnalysisPipeline/outputs:/app/AnalysisPipeline/outputs
